name: Build and Release PH Code

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (leave empty for nightly build)'
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest

    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download w64devkit
      run: |
        # 下载 w64devkit 安装包
        $downloadUrl = "https://github.com/skeeto/w64devkit/releases/download/v2.5.0/w64devkit-x64-2.5.0.7z.exe"
        $outputFile = "w64devkit-installer.exe"
        Invoke-WebRequest -Uri $downloadUrl -OutFile $outputFile
        Write-Host "w64devkit 下载完成"

    - name: Extract w64devkit
      run: |
        # 使用自解压方式解压（会创建 w64devkit 子目录）
        Start-Process -FilePath ".\w64devkit-installer.exe" -ArgumentList "-ow64devkit_extract", "-y" -Wait -NoNewWindow

        # 移动 w64devkit 子目录到根目录
        if (Test-Path "w64devkit_extract\w64devkit") {
          Move-Item -Path "w64devkit_extract\w64devkit" -Destination "w64devkit" -Force
          Remove-Item -Path "w64devkit_extract" -Recurse -Force
        }

        # 验证
        if (Test-Path "w64devkit\bin\g++.exe") {
          Write-Host "✓ g++ 编译器已准备就绪：w64devkit\bin\g++.exe"
        } else {
          Write-Error "g++ 编译器未找到"
          Get-ChildItem -Path "." -Directory | Select-Object Name
          exit 1
        }

    - name: Determine version
      shell: pwsh
      id: version
      run: |
        # 确定版本号
        if ("${{ inputs.version }}" -ne "") {
          $version = "${{ inputs.version }}"
        } elseif ("${{ github.event_name }}" -eq "push") {
          $version = "nightly"
        } else {
          $version = "nightly"
        }

        # 如果是 nightly，添加构建时间（精确到时，格式：yyyyMMddHH）
        if ($version -eq "nightly") {
          # 获取 UTC 时间
          $buildTime = (Get-Date).ToUniversalTime().ToString("yyyyMMddHH")
          $version = "nightly-$buildTime"
        }

        # 判断是否为 prerelease
        $isPrerelease = "false"
        if ($version.StartsWith("nightly-") -or $version.Contains("beta")) {
          $isPrerelease = "true"
        }

        # 设置 step outputs
        Write-Host "version=$version"
        Write-Host "::set-output name=version::$version"
        Write-Host "isPrerelease=$isPrerelease"
        Write-Host "::set-output name=isPrerelease::$isPrerelease"

    - name: Delete old nightly release and tag
      if: startsWith(steps.version.outputs.version, 'nightly-')
      shell: pwsh
      run: |
        # 删除旧的 nightly release 和 tag
        $tag = "nightly"

        # 获取所有 releases
        $releases = gh api repos/:owner/:repo/releases --jq '.[] | select(.tag_name == "nightly") | .id'

        if ($releases) {
          foreach ($releaseId in $releases) {
            Write-Host "Deleting release ID: $releaseId"
            gh api --method DELETE repos/:owner/:repo/releases/$releaseId
          }
        }

        # 删除 tag
        $tags = git tag -l "nightly"
        if ($tags) {
          git push origin :refs/tags/nightly
          git tag -d nightly
          Write-Host "Deleted old nightly tag"
        }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update version in index.html
      shell: pwsh
      run: |
        # 使用步骤输出中的版本号
        $version = "${{ steps.version.outputs.version }}"

        # 替换 index.html 中的版本号
        $filePath = "templates\index.html"
        $content = Get-Content -Path $filePath -Raw -Encoding UTF8
        $content = $content -replace '<p>web版本</p>', "<p>版本号：$version</p>"
        Set-Content -Path $filePath -Value $content -Encoding UTF8 -NoNewline

        Write-Host "✓ 已更新版本号为：$version"

    - name: Build executable with PyInstaller
      run: |
        # 使用 PyInstaller 构建单文件可执行文件（包含 Python 核心），无控制台窗口
        python -m PyInstaller --onefile --windowed --noconfirm `
          --name phcode `
          --icon=static/logo.ico `
          app_gui.py

    - name: Create ZIP archive
      shell: pwsh
      run: |
        # 创建包含可执行文件、w64devkit 和资源的 ZIP 归档
        $version = "${{ steps.version.outputs.version }}"
        if ($version.StartsWith("nightly-")) {
          $zipFileName = "phcode-$version.zip"
        } else {
          $zipFileName = "phcode-v$version.zip"
        }

        # 创建临时目录并将所有文件复制进去
        New-Item -ItemType Directory -Name "temp_package" -Force
        Copy-Item "dist\phcode.exe" -Destination "temp_package\"
        Copy-Item "templates" -Recurse -Destination "temp_package\"
        Copy-Item "static" -Recurse -Destination "temp_package\"
        Copy-Item "w64devkit" -Recurse -Destination "temp_package\"

        # 创建空的 phcode_data 目录（用于存储用户数据）
        New-Item -ItemType Directory -Name "temp_package\phcode_data" -Force

        # 使用 PowerShell 创建 ZIP 归档
        Compress-Archive -Path "temp_package\*" -DestinationPath $zipFileName -Force

        Write-Host "Created ZIP archive: $zipFileName"

    - name: Install NSIS
      id: nsis
      uses: negrutiu/nsis-install@v2
      with:
        nsis-version: official

    - name: Create installer with NSIS
      shell: pwsh
      run: |
        # 定义版本号（直接使用步骤输出中的版本号）
        $version = "${{ steps.version.outputs.version }}"

        # NSIS 已添加到 PATH，直接使用 makensis 命令
        $installerScript = "installer.nsi"

        Write-Host "正在编译安装程序，版本：$version"
        makensis /INPUTCHARSET UTF8 /DVERSION=$version $installerScript

        # 验证安装程序是否创建
        $installerExe = "phcode-installer-$version.exe"
        if (Test-Path $installerExe) {
          Write-Host "✓ 安装程序创建成功：$installerExe"
          $installerSize = (Get-Item $installerExe).Length / 1MB
          Write-Host "安装程序大小：$([math]::Round($installerSize, 2)) MB"
        } else {
          Write-Error "安装程序创建失败"
          Get-ChildItem -Filter "*.exe"
          exit 1
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: phcode-build
        path: |
          *.zip
          *.exe
          dist/phcode.exe

    - name: Save version info for Android job
      run: |
        $version = "${{ steps.version.outputs.version }}"
        # 保存实际版本号（不是 tagName），Android job 会自己计算 tagName
        Set-Content -Path "version_info.txt" -Value "$version" -Encoding UTF8 -NoNewline
        Write-Host "Saved version: $version"

    - name: Upload version info
      uses: actions/upload-artifact@v4
      with:
        name: version-info
        path: version_info.txt
        retention-days: 1

    - name: Generate release notes
      shell: pwsh
      id: release_notes
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $notes = ""

        if ($version.StartsWith("nightly-")) {
          $notes = "## PH Code Nightly Build 当前版本为开发中版本，可能包含最新功能但也可能存在未解决的 bug。"
        } elseif ($version -like "*beta*") {
          $notes = "## PH Code Beta build 当前版本为预览版，可能存在未知的 bug，建议仅在测试环境中使用。"
        } else {
          $notes = "## PH Code 稳定版本。"
        }

        # 设置 step output
        Write-Host "notes=$notes"
        Write-Host "::set-output name=notes::$notes"
        Write-Host "Release notes generated"

    - name: Create Release
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $notes = "${{ steps.release_notes.outputs.notes }}"
        $isPrerelease = "${{ steps.version.outputs.isPrerelease }}"

        # 设置 tag 名称和文件名
        if ($version.StartsWith("nightly-")) {
          $tagName = "nightly"
          $releaseName = "Nightly Build - $version"
          $zipFile = "phcode-$version.zip"
          $installerFile = "phcode-installer-$version.exe"
        } else {
          $tagName = "v$version"
          $releaseName = "Release v$version"
          $zipFile = "phcode-v$version.zip"
          $installerFile = "phcode-installer-$version.exe"
        }

        # 创建 tag
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -f $tagName
        git push -f origin $tagName

        # 创建 release
        gh release create $tagName `
          --title "$releaseName" `
          --notes "$notes" `
          --prerelease=$isPrerelease `
          $zipFile $installerFile

        Write-Host "✓ Release created: $releaseName"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 从 Windows job 获取版本号（通过 artifact）
      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info

      - name: Get version from build job
        id: get_version
        run: |
          # 读取版本号，去除前后空格和换行符
          VERSION=$(cat version_info.txt | tr -d '\n\r' | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本: $VERSION"

          # 计算 tagName（与 Windows job 保持一致）
          if [[ "$VERSION" == nightly-* ]]; then
            TAG_NAME="nightly"
          else
            # 确保 tagName 有 'v' 前缀
            if [[ "$VERSION" == v* ]]; then
              TAG_NAME="$VERSION"
            else
              TAG_NAME="v$VERSION"
            fi
          fi
          echo "tagName=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "tagName: $TAG_NAME"

          # 解析 versionCode（必须是整数，且每次构建必须递增）
          # 使用 Git commit 数量确保严格递增
          VC=$(git rev-list --count HEAD)
          if [ -z "$VC" ] || ! [[ "$VC" =~ ^[0-9]+$ ]]; then
            VC="1"
          fi
          echo "versionCode=$VC" >> $GITHUB_OUTPUT
          echo "versionCode: $VC"

      - name: Prepare Android assets
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          mkdir -p android-app/app/src/main/assets

          # 复制 index.html 并注入远程 API
          echo '<script>window.RUN_API_URL="https://hcz1017.pythonanywhere.com/run";</script>' > android-app/app/src/main/assets/index.html
          cat templates/index.html >> android-app/app/src/main/assets/index.html

          # 替换版本号（和 Windows job 保持一致）
          sed -i "s|<p>web版本</p>|<p>版本号：$VERSION</p>|g" android-app/app/src/main/assets/index.html

          # 复制 static 目录
          cp -r static android-app/app/src/main/assets/static

          # 修复路径：/static/ → static/
          sed -i 's|"/static/|"static/|g' android-app/app/src/main/assets/index.html
          find android-app/app/src/main/assets/static -name "*.js" -exec sed -i "s|'/static/|'static/|g" {} \;
          find android-app/app/src/main/assets/static -name "*.js" -exec sed -i 's|"/static/|"static/|g' {} \;
          find android-app/app/src/main/assets/static -name "*.js" -exec sed -i 's|`/static/|`static/|g' {} \;
          
          # 修复 fetch 调用的路径
          find android-app/app/src/main/assets/static -name "*.js" -exec sed -i "s|fetch('/static/|fetch('static/|g" {} \;
          find android-app/app/src/main/assets/static -name "*.js" -exec sed -i 's|fetch("/static/|fetch("static/|g' {} \;

          # 修复运行 API 路径（所有 JS 文件）
          find android-app/app/src/main/assets/static -name "*.js" -exec sed -i "s|fetch('/run'|fetch(window.RUN_API_URL|g" {} \;
          find android-app/app/src/main/assets/static -name "*.js" -exec sed -i 's|fetch("/run"|fetch(window.RUN_API_URL|g' {} \;
          find android-app/app/src/main/assets/static -name "*.js" -exec sed -i "s|'/run'|window.RUN_API_URL|g" {} \;
          find android-app/app/src/main/assets/static -name "*.js" -exec sed -i 's|"/run"|window.RUN_API_URL|g' {} \;

      - name: Generate Android project
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          VERSION_CODE="${{ steps.get_version.outputs.versionCode }}"

          # 创建 res 资源目录
          mkdir -p android-app/app/src/main/res/values
          mkdir -p android-app/app/src/main/res/mipmap-hdpi
          mkdir -p android-app/app/src/main/res/mipmap-xhdpi
          mkdir -p android-app/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-app/app/src/main/res/mipmap-xxxhdpi

          # strings.xml（应用名）
          cat > android-app/app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">PH CODE</string>
          </resources>
          EOF

          # 复制 logo 作为应用图标（多尺寸）
          cp static/logo.png android-app/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp static/logo.png android-app/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp static/logo.png android-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp static/logo.png android-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # AndroidManifest.xml
          cat > android-app/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:supportsRtl="true"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XMLEOF

          # MainActivity.java
          mkdir -p android-app/app/src/main/java/com/hcz/phcode
          cat > android-app/app/src/main/java/com/hcz/phcode/MainActivity.java << 'JAVAEOF'
          package com.hcz.phcode;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebResourceResponse;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.webkit.WebViewAssetLoader;
          import androidx.webkit.WebViewAssetLoader.AssetsPathHandler;
          import java.io.InputStream;
          import java.util.HashMap;
          import java.util.Map;
          public class MainActivity extends Activity {
              private WebViewAssetLoader assetLoader;
              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  assetLoader = new WebViewAssetLoader.Builder()
                      .addPathHandler("/assets/", new AssetsPathHandler(this))
                      .build();
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public WebResourceResponse shouldInterceptRequest(WebView view, WebResourceRequest request) {
                          WebResourceResponse response = assetLoader.shouldInterceptRequest(request.getUrl());
                          if (response != null) {
                              String url = request.getUrl().toString();
                              // 为 HTML 和 JS 文件添加 COOP + COEP 头（支持 SharedArrayBuffer）
                              if (url.endsWith(".html") || url.endsWith(".js") || url.endsWith(".wasm")) {
                                  Map<String, String> headers = response.getResponseHeaders();
                                  if (headers == null) {
                                      headers = new HashMap<>();
                                  }
                                  headers.put("Cross-Origin-Opener-Policy", "same-origin");
                                  headers.put("Cross-Origin-Embedder-Policy", "require-corp");
                                  response.setResponseHeaders(headers);
                              }
                          }
                          return response;
                      }
                  });
                  webView.loadUrl("https://appassets.androidplatform.net/assets/index.html");
              }
              @Override
              public void onBackPressed() {
                  WebView wv = findViewById(android.R.id.content);
                  if (wv.canGoBack()) wv.goBack();
                  else super.onBackPressed();
              }
          }
          JAVAEOF

          # build.gradle (app) — 使用动态版本号
          VERSION_ESCAPED=$(echo "$VERSION" | sed 's/"/\\"/g')
          cat > android-app/app/build.gradle << GRADLEOF
          plugins { id 'com.android.application' }
          android {
              namespace 'com.hcz.phcode'
              compileSdk 34
              signingConfigs {
                  release {
                      storeFile file('phcode.keystore')
                      storePassword System.getenv('KEYSTORE_PASSWORD')
                      keyAlias System.getenv('KEY_ALIAS')
                      keyPassword System.getenv('KEY_PASSWORD')
                  }
              }
              defaultConfig {
                  applicationId "com.hcz.phcode"
                  minSdk 21
                  targetSdk 34
                  versionCode $VERSION_CODE
                  versionName "$VERSION_ESCAPED"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
                  debug { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.webkit:webkit:1.8.0'
          }
          GRADLEOF

          # build.gradle (project)
          cat > android-app/build.gradle << 'GRADLEOF'
          plugins { id 'com.android.application' version '8.2.0' apply false }
          GRADLEOF

          # settings.gradle
          cat > android-app/settings.gradle << 'GRADLEOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "PHCODE"
          include ':app'
          GRADLEOF

          # gradle.properties
          cat > android-app/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          EOF

          # 创建 gradle wrapper 配置
          cd android-app
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create Gradle Wrapper
        run: |
          cd android-app
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar"
          curl -L -o gradlew \
            "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew"
          chmod +x gradlew

      - name: Decode keystore
        run: |
          # 从 GitHub Secrets 获取 base64 编码的 keystore
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android-app/app/phcode.keystore

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android-app
          ./gradlew assembleRelease --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          apk_path=$(find android-app/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$apk_path" >> $GITHUB_OUTPUT
          echo "找到 APK: $apk_path"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PHCODE-android
          path: ${{ steps.find_apk.outputs.apk_path }}

      - name: Upload APK to Release
        run: |
          tagName="${{ steps.get_version.outputs.tagName }}"
          apk_path="${{ steps.find_apk.outputs.apk_path }}"
          apk_name="PHCODE-android.apk"
          cp "$apk_path" "$apk_name"

          # 先删除旧资产再上传（避免重复）
          gh release delete-asset "$tagName" "$apk_name" --yes 2>/dev/null || true
          gh release upload "$tagName" "$apk_name"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}